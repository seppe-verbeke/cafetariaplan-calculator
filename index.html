<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafetariaplan Calculator — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ─── Reset & tokens ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#3FA49C;--teal-light:#E8F4F4;--teal-mid:#236B65;--teal-dark:#1a524e;
  --bg:#F4F7F7;--surface:#fff;--border:#EBEBEB;--border-strong:#D8D8D8;
  --text:#111;--muted:#555;--subtle:#999;--faint:#CCC;
  --green:#0F766E;--green-bg:#F0FAF9;
  --red:#DC2626;--red-bg:#FEF2F2;
  --amber:#92400E;--amber-bg:#FFFBEB;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);
  --shadow-md:0 4px 20px rgba(0,0,0,.08);
  --r:10px;--r-sm:6px;--r-pill:999px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);font-size:14px;-webkit-font-smoothing:antialiased}

/* ─── Layout ─────────────────────────────────────────── */
.app{display:flex;flex-direction:column;min-height:100vh}

/* ─── Topbar ─────────────────────────────────────────── */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.top-brand{display:flex;align-items:center;gap:10px}
.top-logo{
  width:34px;height:34px;
  background:var(--teal-light);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.top-logo svg{width:18px;height:18px;stroke:var(--teal-mid)}
.top-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text)}
.top-sub{font-size:11px;color:var(--subtle);margin-top:1px}
.top-right{display:flex;align-items:center;gap:10px}
.status-dot{
  width:7px;height:7px;
  border-radius:50%;
  background:var(--faint);
  display:inline-block;
  margin-right:5px;
  transition:background .3s;
}
.status-dot.live{background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.status-dot.err{background:var(--red)}
.status-txt{font-size:12px;color:var(--muted)}
.btn-icon{
  width:32px;height:32px;
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);
  transition:border-color .15s,color .15s;
}
.btn-icon:hover{border-color:var(--teal);color:var(--teal)}
.btn-icon svg{width:14px;height:14px;stroke:currentColor}
.last-upd{font-size:11px;color:var(--faint)}

/* ─── Main ───────────────────────────────────────────── */
.main{flex:1;padding:24px 28px;max-width:1200px;width:100%;margin:0 auto}

/* ─── Period bar ─────────────────────────────────────── */
.toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:22px;
  flex-wrap:wrap;
  gap:10px;
}
.period-group{display:flex;gap:4px}
.period-btn{
  padding:6px 14px;
  border:1px solid var(--border);
  border-radius:var(--r-pill);
  font-size:12px;font-weight:500;
  color:var(--muted);
  background:var(--surface);
  cursor:pointer;
  font-family:inherit;
  transition:all .15s;
}
.period-btn:hover{border-color:var(--teal);color:var(--teal-mid)}
.period-btn.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}
.toolbar-right{font-size:12px;color:var(--subtle)}
.toolbar-right strong{color:var(--muted)}

/* ─── KPI row ────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px 20px 16px;
  position:relative;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .2s;
}
.kpi:hover{box-shadow:var(--shadow-md)}
.kpi.accent{border-top:3px solid var(--teal)}
.kpi-label{
  font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--subtle);margin-bottom:10px;
}
.kpi-val{
  font-family:'DM Serif Display',serif;
  font-size:32px;color:var(--text);line-height:1;
}
.kpi-sub{font-size:11px;color:var(--faint);margin-top:6px}
.kpi-chip{
  position:absolute;top:16px;right:16px;
  font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:var(--r-pill);
}
.chip-green{background:var(--green-bg);color:var(--green)}
.chip-neu{background:#F5F5F5;color:var(--subtle)}
.chip-red{background:var(--red-bg);color:var(--red)}

/* ─── Cards ──────────────────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 22px;
  box-shadow:var(--shadow-sm);
}
.card-title{
  font-size:13px;font-weight:600;
  color:var(--text);margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.card-title-badge{
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:var(--r-pill);
  background:var(--teal-light);color:var(--teal-mid);
  margin-left:auto;
}

/* ─── Funnel ─────────────────────────────────────────── */
.funnel-wrap{display:flex;align-items:flex-end;gap:0;min-height:140px}
.funnel-col{flex:1;display:flex;flex-direction:column;align-items:center}
.funnel-bar-wrap{width:100%;display:flex;justify-content:center;align-items:flex-end;height:90px}
.funnel-bar{
  width:56%;
  border-radius:6px 6px 0 0;
  transition:height .6s cubic-bezier(.4,0,.2,1);
  min-height:4px;
}
.fb1{background:linear-gradient(180deg,#3FA49C,#2d8a83)}
.fb2{background:linear-gradient(180deg,#60C4BC,#3FA49C)}
.fb3{background:linear-gradient(180deg,#A8DED9,#60C4BC)}
.funnel-meta{text-align:center;padding-top:10px}
.funnel-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px}
.funnel-count{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);line-height:1}
.funnel-pct{font-size:10px;color:var(--faint);margin-top:2px}
.funnel-arrow{
  flex:0 0 28px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding-bottom:44px;
  gap:2px;
}
.arrow-icon{color:var(--faint);font-size:16px;line-height:1}
.arrow-drop{font-size:9px;font-weight:700;color:#E55}

/* ─── Grid layouts ───────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.grid-3-1{display:grid;grid-template-columns:3fr 1fr;gap:14px;margin-bottom:16px}
.grid-1{margin-bottom:16px}

/* ─── Bar chart rows ─────────────────────────────────── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:12px;color:var(--muted);width:200px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:#F0F0F0;border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bf-teal{background:var(--teal)}
.bf-teal2{background:#60C4BC}
.bf-teal3{background:#A8DED9}
.bar-count{font-size:11px;color:var(--subtle);width:24px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}

/* ─── Timeline chart ─────────────────────────────────── */
.chart-wrap{position:relative;width:100%;height:180px}
.chart-legend{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ─── Choices breakdown ──────────────────────────────── */
.choice-section{margin-bottom:16px}
.choice-section-title{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--faint);margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}

/* ─── Events table ───────────────────────────────────── */
.evt-table{width:100%;border-collapse:collapse;font-size:12px}
.evt-table th{
  text-align:left;padding:7px 10px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--subtle);border-bottom:1px solid var(--border);
}
.evt-table td{
  padding:8px 10px;
  border-bottom:1px solid #F8F8F8;
  color:var(--muted);
  vertical-align:middle;
}
.evt-table tr:last-child td{border-bottom:none}
.evt-table tr:hover td{background:#FAFAFA}
.evt-tag{
  display:inline-block;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:var(--r-pill);white-space:nowrap;
}
.tag-start{background:#EEF2FF;color:#4F46E5}
.tag-step_complete{background:#FFF7ED;color:#C2410C}
.tag-result{background:var(--green-bg);color:var(--green)}
.tag-restart{background:#FDF4FF;color:#7E22CE}
.tag-choice{background:#F0F9FF;color:#0369A1}

/* ─── Stat mini cards ────────────────────────────────── */
.mini-stats{display:flex;flex-direction:column;gap:10px}
.mini-stat{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:12px 14px;
}
.mini-stat-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--subtle);margin-bottom:4px}
.mini-stat-val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);line-height:1}
.mini-stat-sub{font-size:11px;color:var(--faint);margin-top:3px}

/* ─── Choice pills ───────────────────────────────────── */
.choice-pills{display:flex;flex-wrap:wrap;gap:6px}
.choice-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r-pill);font-size:12px;color:var(--muted);
}
.choice-pill .cp-cnt{
  background:var(--teal-light);color:var(--teal-mid);
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:var(--r-pill);
}

/* ─── Delta distribution ─────────────────────────────── */
.delta-dist{display:flex;flex-direction:column;gap:6px}
.delta-row{display:flex;align-items:center;gap:8px;font-size:12px}
.delta-range{color:var(--muted);width:80px;flex-shrink:0;font-variant-numeric:tabular-nums}
.delta-track{flex:1;background:#F0F0F0;border-radius:4px;height:8px;overflow:hidden}
.delta-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--teal-light),var(--teal));transition:width .6s}
.delta-cnt{font-size:11px;color:var(--subtle);width:24px;text-align:right;flex-shrink:0}

/* ─── Empty / loading ────────────────────────────────── */
.empty{text-align:center;padding:32px;color:var(--faint);font-size:13px}
.loading-wrap{display:flex;align-items:center;justify-content:center;height:200px;color:var(--faint);font-size:13px;gap:10px}
.spinner{
  width:18px;height:18px;border:2px solid var(--border);
  border-top-color:var(--teal);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Responsive ─────────────────────────────────────── */
@media(max-width:900px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3-1{grid-template-columns:1fr}
  .main{padding:16px}
  .topbar{padding:0 16px}
}
@media(max-width:500px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .kpi-val{font-size:26px}
}
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="top-brand">
      <div class="top-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
      </div>
      <div>
        <div class="top-title">Cafetariaplan Calculator</div>
        <div class="top-sub">The Workspace Company — tracking dashboard</div>
      </div>
    </div>
    <div class="top-right">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-txt" id="status-txt">Laden...</span>
      <button class="btn-icon" onclick="loadData()" title="Vernieuwen">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
        </svg>
      </button>
      <span class="last-upd" id="last-upd"></span>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="period-group">
        <button class="period-btn" id="p1" onclick="setPeriod(1)">Vandaag</button>
        <button class="period-btn" id="p7" onclick="setPeriod(7)">7 dagen</button>
        <button class="period-btn active" id="p30" onclick="setPeriod(30)">30 dagen</button>
        <button class="period-btn" id="p0" onclick="setPeriod(0)">Alles</button>
      </div>
      <div class="toolbar-right" id="toolbar-count"></div>
    </div>

    <!-- Content -->
    <div id="content">
      <div class="loading-wrap"><div class="spinner"></div>Data laden...</div>
    </div>

  </main>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────
// Vervang dit met je eigen Apps Script deployment URL
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbxjuQEB-mdrIJKjgcRi1w-mbdv0U8xYnLYG5f0LTZa3ZjAuwvyD5B5DM5sWJiK9QAiR/exec';

var ALL_ROWS = [];
var PERIOD   = 30;
var tlChart  = null;

// ── Periode ───────────────────────────────────────────────────────
function setPeriod(d) {
  PERIOD = d;
  ['p1','p7','p30','p0'].forEach(function(id){
    document.getElementById(id).classList.toggle('active', String(d) === id.replace('p',''));
  });
  // fix: p0 special case
  document.getElementById('p0').classList.toggle('active', d === 0);
  render(filter(ALL_ROWS));
}

function filter(rows) {
  if (PERIOD === 0) return rows;
  var cut = new Date();
  cut.setDate(cut.getDate() - PERIOD);
  return rows.filter(function(r){ return new Date(r.timestamp) >= cut; });
}

// ── Load ──────────────────────────────────────────────────────────
function loadData() {
  document.getElementById('status-dot').className = 'status-dot';
  document.getElementById('status-txt').textContent = 'Laden...';

  fetch(SHEET_URL)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.status === 'ok' && data.rows) {
        ALL_ROWS = data.rows.map(function(r){
          return {
            timestamp: r.timestamp || '',
            event:     r.event     || '',
            step:      r.stap      || r.step  || '',
            choice:    r.keuze     || r.choice || '',
            extra:     r.extra     || '',
            domain:    r.domein    || r.domain || '',
          };
        });
        document.getElementById('status-dot').className = 'status-dot live';
        document.getElementById('status-txt').textContent = 'Live';
        document.getElementById('last-upd').textContent =
          'Bijgewerkt ' + new Date().toLocaleTimeString('nl-BE', {hour:'2-digit',minute:'2-digit'});
        render(filter(ALL_ROWS));
      } else {
        showEmpty();
      }
    })
    .catch(function(){
      document.getElementById('status-dot').className = 'status-dot err';
      document.getElementById('status-txt').textContent = 'Verbindingsfout';
      document.getElementById('content').innerHTML =
        '<div class="empty" style="color:#DC2626">Kon geen data laden. Controleer de SHEET_URL bovenaan het script.</div>';
    });
}

// ── Render ────────────────────────────────────────────────────────
function render(rows) {
  document.getElementById('toolbar-count').innerHTML =
    '<strong>' + rows.length + '</strong> events in periode';

  // ── Basismetrics
  var starts    = rows.filter(function(r){ return r.event === 'start'; }).length;
  var completes = rows.filter(function(r){ return r.event === 'step_complete'; });
  var results   = rows.filter(function(r){ return r.event === 'result'; });
  var restarts  = rows.filter(function(r){ return r.event === 'restart'; }).length;

  // Unieke "geactiveerd" = sessies die minstens één choice of step_complete hadden
  var sessions = {};
  rows.filter(function(r){ return r.event === 'choice' || r.event === 'step_complete' || r.event === 'result'; })
    .forEach(function(r){
      var k = (r.domain || '') + '|' + (r.timestamp || '').substring(0,16);
      sessions[k] = true;
    });
  var activated = Object.keys(sessions).length;
  var finished  = results.length;

  var pctAct  = starts > 0 ? Math.round((activated / starts) * 100) : 0;
  var pctFin  = activated > 0 ? Math.round((finished / activated) * 100) : 0;
  var convRate = starts > 0 ? Math.round((finished / starts) * 100) : 0;
  var drop1   = starts > 0 ? Math.round(((starts - activated) / starts) * 100) : 0;
  var drop2   = activated > 0 ? Math.round(((activated - finished) / activated) * 100) : 0;

  // ── Choice breakdown
  var choiceGroups = {
    statuut:  {},
    methode:  {},
    schijf:   {},
    funding:  {},
    bonus:    {},
    device:   {}
  };
  var deltas = {};

  rows.forEach(function(r){
    if (r.event === 'choice' || r.event === 'step_complete') {
      // Parse keuze string: "statuut:bediende|methode:premie|..."
      var parts = (r.choice || '').split('|');
      parts.forEach(function(p){
        var kv = p.split(':');
        if (kv.length < 2) return;
        var k = kv[0].trim();
        var v = kv.slice(1).join(':').trim();
        if (choiceGroups[k] !== undefined) {
          choiceGroups[k][v] = (choiceGroups[k][v] || 0) + 1;
        }
      });
    }
    if (r.event === 'result') {
      // extra = "delta:456"
      var m = (r.extra || '').match(/delta:(-?\d+)/);
      if (m) {
        var d = parseInt(m[1]);
        var bucket = deltaB(d);
        deltas[bucket] = (deltas[bucket] || 0) + 1;
      }
    }
  });

  // ── Gemiddeld voordeel
  var deltaVals = [];
  rows.filter(function(r){ return r.event === 'result'; }).forEach(function(r){
    var m = (r.extra || '').match(/delta:(-?\d+)/);
    if (m) deltaVals.push(parseInt(m[1]));
  });
  var avgDelta = deltaVals.length
    ? Math.round(deltaVals.reduce(function(a,b){return a+b;},0) / deltaVals.length)
    : 0;

  // ── Timeline
  var tl = buildTimeline(rows);

  // ── Recente events
  var recent = rows.slice(-12).reverse();

  // ── HTML opbouwen
  var h = '';

  // KPIs
  h += '<div class="kpi-row">';
  h += kpi('Impressies', starts, 'Widget geladen', true, '');
  h += kpi('Geactiveerd', activated, 'Eerste stap gestart', false,
       starts > 0 ? chipHtml(pctAct + '%', pctAct > 50 ? 'green' : 'neu') : '');
  h += kpi('Berekeningen', finished, 'Voordeel berekend', false,
       activated > 0 ? chipHtml(pctFin + '%', pctFin > 30 ? 'green' : 'neu') : '');
  h += kpi('Gem. voordeel', avgDelta > 0 ? '+€' + avgDelta.toLocaleString('nl-BE') : '–',
       'Per berekening', false, '');
  h += '</div>';

  // Funnel
  var maxF = Math.max(starts, activated, finished, 1);
  h += '<div class="card grid-1">';
  h += '<div class="card-title">Funnel — impressie → geactiveerd → berekening voltooid</div>';
  h += '<div class="funnel-wrap">';
  h += funnelCol('Impressies', starts, 100, 'fb1', maxF);
  h += '<div class="funnel-arrow"><span class="arrow-icon">›</span><span class="arrow-drop">-' + drop1 + '%</span></div>';
  h += funnelCol('Geactiveerd', activated, pctAct, 'fb2', maxF);
  h += '<div class="funnel-arrow"><span class="arrow-icon">›</span><span class="arrow-drop">-' + drop2 + '%</span></div>';
  h += funnelCol('Voltooid', finished, pctFin, 'fb3', maxF);
  h += '</div></div>';

  // Timeline
  h += '<div class="card grid-1">';
  h += '<div class="card-title">Activiteit over tijd';
  h += '<span class="card-title-badge">per dag</span></div>';
  h += '<div class="chart-legend">';
  h += '<div class="legend-item"><div class="legend-dot" style="background:#3FA49C"></div>Impressies</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:#60C4BC"></div>Geactiveerd</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:#A8DED9"></div>Voltooid</div>';
  h += '</div>';
  h += '<div class="chart-wrap"><canvas id="tlChart"></canvas></div>';
  h += '</div>';

  // Keuzes + delta
  h += '<div class="grid-2">';

  // Keuzegedrag
  h += '<div class="card">';
  h += '<div class="card-title">Keuzegedrag</div>';
  h += choiceSection('Statuut', choiceGroups.statuut, {'bediende':'Bediende','arbeider':'Arbeider'});
  h += choiceSection('Financieringswijze', choiceGroups.methode, {'premie':'Eindejaarspremie','bonus':'Bonus','brutoloon':'Brutoloon'});
  h += choiceSection('Belastingschijf', choiceGroups.schijf, {'0.4':'~40% (laag)','0.535':'~53,5% (midden)','0.6':'~60% (hoog)'});
  h += choiceSection('Funding factor', choiceGroups.funding, {'1':'Geen (1,0×)','1.05':'1,05×','1.1':'1,10×','1.15':'1,15×'});
  h += '</div>';

  // Voordeel verdeling + mini stats
  h += '<div style="display:flex;flex-direction:column;gap:14px">';
  h += '<div class="card">';
  h += '<div class="card-title">Verdeling berekend voordeel</div>';
  if (Object.keys(deltas).length === 0) {
    h += '<div class="empty" style="padding:12px">Nog geen berekeningen</div>';
  } else {
    var deltaOrder = ['€0–100','€101–250','€251–500','€501–750','€751–1000','€1000+'];
    var maxD = Math.max.apply(null, deltaOrder.map(function(k){ return deltas[k]||0; }).concat([1]));
    h += '<div class="delta-dist">';
    deltaOrder.forEach(function(k){
      var cnt = deltas[k] || 0;
      var pct = Math.round((cnt/maxD)*100);
      h += '<div class="delta-row">';
      h += '<span class="delta-range">' + k + '</span>';
      h += '<div class="delta-track"><div class="delta-fill" style="width:' + pct + '%"></div></div>';
      h += '<span class="delta-cnt">' + cnt + '</span>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';

  h += '<div class="card">';
  h += '<div class="card-title">Overig</div>';
  h += '<div class="mini-stats">';
  h += miniStat('Herstarts', restarts, 'keer opnieuw begonnen');
  h += miniStat('Conversie', convRate + '%', 'impressie → berekening');
  h += miniStat('Stap 2 bereikt',
    completes.filter(function(r){ return (r.choice||'').indexOf('bonus:')>-1; }).length,
    'stap 2 voltooid');
  h += '</div></div>';

  h += '</div>'; // grid-2

  // Recente events
  h += '<div class="card grid-1">';
  h += '<div class="card-title">Recente events <span class="card-title-badge">laatste 12</span></div>';
  if (recent.length === 0) {
    h += '<div class="empty">Nog geen events</div>';
  } else {
    h += '<table class="evt-table"><thead><tr>';
    h += '<th>Tijdstip</th><th>Event</th><th>Stap</th><th>Keuze</th><th>Extra</th>';
    h += '</tr></thead><tbody>';
    recent.forEach(function(r){
      h += '<tr>';
      h += '<td>' + fmtTime(r.timestamp) + '</td>';
      h += '<td><span class="evt-tag tag-' + (r.event||'').replace(/[^a-z_]/g,'') + '">' + (r.event||'—') + '</span></td>';
      h += '<td>' + (r.step || '—') + '</td>';
      h += '<td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(r.choice||'—') + '</td>';
      h += '<td>' + esc(r.extra||'—') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
  }
  h += '</div>';

  document.getElementById('content').innerHTML = h;
  drawTimeline(tl);
}

// ── Helpers ───────────────────────────────────────────────────────
function kpi(label, val, sub, accent, chip) {
  return '<div class="kpi' + (accent?' accent':'') + '">' +
    '<div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-val">' + val + '</div>' +
    '<div class="kpi-sub">' + sub + '</div>' +
    (chip ? chip : '') +
    '</div>';
}
function chipHtml(txt, type) {
  return '<span class="kpi-chip chip-' + type + '">' + txt + '</span>';
}
function funnelCol(label, count, pct, cls, maxF) {
  var h = Math.max(8, Math.round((count / maxF) * 80));
  return '<div class="funnel-col">' +
    '<div class="funnel-bar-wrap"><div class="funnel-bar ' + cls + '" style="height:' + h + 'px"></div></div>' +
    '<div class="funnel-meta">' +
    '<div class="funnel-label">' + label + '</div>' +
    '<div class="funnel-count">' + count + '</div>' +
    '<div class="funnel-pct">' + pct + '%</div>' +
    '</div></div>';
}
function choiceSection(title, counts, labels) {
  var keys = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
  if (keys.length === 0) return '';
  var max = counts[keys[0]] || 1;
  var html = '<div class="choice-section">';
  html += '<div class="choice-section-title">' + title + '</div>';
  keys.forEach(function(k){
    var lbl = labels[k] || k;
    var pct = Math.round((counts[k]/max)*100);
    html += '<div class="bar-row">';
    html += '<div class="bar-lbl">' + lbl + '</div>';
    html += '<div class="bar-track"><div class="bar-fill bf-teal" style="width:' + pct + '%"></div></div>';
    html += '<div class="bar-count">' + counts[k] + '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}
function miniStat(label, val, sub) {
  return '<div class="mini-stat">' +
    '<div class="mini-stat-label">' + label + '</div>' +
    '<div class="mini-stat-val">' + val + '</div>' +
    '<div class="mini-stat-sub">' + sub + '</div>' +
    '</div>';
}
function deltaB(n) {
  if (n <= 100)  return '€0–100';
  if (n <= 250)  return '€101–250';
  if (n <= 500)  return '€251–500';
  if (n <= 750)  return '€501–750';
  if (n <= 1000) return '€751–1000';
  return '€1000+';
}
function buildTimeline(rows) {
  var days = {};
  rows.forEach(function(r){
    if (!r.timestamp) return;
    var d = new Date(r.timestamp);
    if (isNaN(d)) return;
    var k = d.getFullYear() + '-' + p2(d.getMonth()+1) + '-' + p2(d.getDate());
    if (!days[k]) days[k] = {imp:0,act:0,vol:0};
    if (r.event === 'start') days[k].imp++;
    if (r.event === 'step_complete') days[k].act++;
    if (r.event === 'result') days[k].vol++;
  });
  var sorted = Object.keys(days).sort();
  if (!sorted.length) return {labels:[],imp:[],act:[],vol:[]};
  var labels=[],imp=[],act=[],vol=[];
  var s = new Date(sorted[0]), e = new Date(sorted[sorted.length-1]);
  for (var d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
    var k = d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
    labels.push(p2(d.getDate())+'/'+p2(d.getMonth()+1));
    var v = days[k] || {imp:0,act:0,vol:0};
    imp.push(v.imp); act.push(v.act); vol.push(v.vol);
  }
  return {labels:labels,imp:imp,act:act,vol:vol};
}
function drawTimeline(data) {
  var ctx = document.getElementById('tlChart');
  if (!ctx) return;
  if (tlChart) { tlChart.destroy(); tlChart = null; }
  if (!data.labels.length) {
    ctx.parentElement.innerHTML = '<div class="empty">Niet genoeg data voor tijdslijn</div>';
    return;
  }
  tlChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [
        {label:'Impressies', data:data.imp, borderColor:'#3FA49C', backgroundColor:'rgba(63,164,156,.08)',
         fill:true, tension:.35, pointRadius:2.5, borderWidth:2},
        {label:'Geactiveerd', data:data.act, borderColor:'#60C4BC', backgroundColor:'transparent',
         fill:false, tension:.35, pointRadius:2.5, borderWidth:2, borderDash:[5,3]},
        {label:'Voltooid', data:data.vol, borderColor:'#A8DED9', backgroundColor:'transparent',
         fill:false, tension:.35, pointRadius:2.5, borderWidth:2, borderDash:[2,2]},
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{mode:'index',intersect:false,
        callbacks:{label:function(ctx){return ' '+ctx.dataset.label+': '+ctx.parsed.y;}}}},
      scales:{
        x:{grid:{display:false}, ticks:{font:{size:10},color:'#BBB',maxRotation:0,autoSkip:true,maxTicksLimit:12}},
        y:{beginAtZero:true, grid:{color:'rgba(0,0,0,.04)'},
           ticks:{font:{size:10},color:'#BBB',stepSize:1,precision:0}}
      }
    }
  });
}
function p2(n){ return n<10?'0'+n:String(n); }
function fmtTime(ts){
  if (!ts) return '—';
  try {
    var d = new Date(ts);
    return p2(d.getDate())+'/'+p2(d.getMonth()+1)+' '+p2(d.getHours())+':'+p2(d.getMinutes());
  } catch(e){ return ts; }
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showEmpty(){
  document.getElementById('status-dot').className = 'status-dot';
  document.getElementById('status-txt').textContent = 'Geen data';
  document.getElementById('content').innerHTML = '<div class="empty">Nog geen tracking data. Zijn de SHEET_URL en de calculator TRACKING_URL correct ingesteld?</div>';
}

// Auto-refresh elke minuut
setInterval(loadData, 60000);
loadData();
</script>
